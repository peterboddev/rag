version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci --include=dev
      
  pre_build:
    commands:
      - echo "Running unit tests..."
      - npm run test --if-present
      
  build:
    commands:
      - echo "Building TypeScript..."
      - npm run build
      - echo "Synthesizing CDK..."
      - npm run synth
      - echo "Verifying CDK output..."
      - ls -la cdk.out/ | head -20
      - echo "Copying CDK template to expected SAM format..."
      - cp cdk.out/MultiTenantDocumentManagerStack.template.json cdk.out/template.yaml
      - echo "Verifying template.yaml was created..."
      - ls -la cdk.out/template.yaml
      - echo "Template file size:"
      - wc -l cdk.out/template.yaml

artifacts:
  files:
    - '**/*'
    - template.yaml
  base-directory: cdk.out
