version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci
  
  pre_build:
    commands:
      - echo "Running tests..."
      - npm run test
  
  build:
    commands:
      - echo "Building application..."
      - npm run build
      - echo "Synthesizing CDK stack..."
      - npx cdk synth
  
  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
  # Include ALL files - required for npx cdk deploy in deploy stage
  # Platform team's deploy stage needs: source code, cdk.out/, package.json, node_modules, and asset directories

cache:
  paths:
    - 'node_modules/**/*'
