version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci --include=dev
      
  pre_build:
    commands:
      - echo "Running unit tests..."
      - npm run test --if-present
      
  build:
    commands:
      - echo "Building TypeScript..."
      - npm run build
      - echo "Synthesizing CDK..."
      - npx cdk synth --context environment=${ENVIRONMENT:-dev}
      - echo "Listing generated templates..."
      - ls -la cdk.out/*.template.json

  post_build:
    commands:
      - echo "Build completed successfully on $(date)"
      - echo "Artifacts ready for deployment"

artifacts:
  files:
    - '**/*'
  name: BuildOutput

cache:
  paths:
    - 'node_modules/**/*'
