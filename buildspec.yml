version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci --include=dev
      
  pre_build:
    commands:
      - echo "Running unit tests..."
      - npm run test --if-present
      
  build:
    commands:
      - echo "Building TypeScript..."
      - npm run build
      - echo "Synthesizing CDK..."
      - echo "Environment context ${ENVIRONMENT:-dev}"
      - npx cdk synth --context environment=${ENVIRONMENT:-dev}
      - echo "Verifying CDK output..."
      - ls -la cdk.out/ | head -20
      - echo "Checking if RAGApplicationStack template was created..."
      - test -f cdk.out/RAGApplicationStack.template.json && echo "Stack template found" || exit 1
      
  post_build:
    commands:
      - echo "Copying CDK template to expected SAM format..."
      - cp cdk.out/RAGApplicationStack.template.json template.yaml
      - echo "Verifying template.yaml was created..."
      - ls -la template.yaml
      - echo "Build completed successfully"

artifacts:
  files:
    - 'template.yaml'
    - 'cdk.out/**/*'
    - 'dist/**/*'
    - 'src/**/*'
    - 'node_modules/**/*'
    - 'package.json'
    - 'package-lock.json'
  name: BuildOutput

cache:
  paths:
    - 'node_modules/**/*'
